<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Órdenes de Compra</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      max-width: 1000px;
      margin: auto;
      padding: 20px;
      background-color: #f5f7fa;
    }
    h1 {
      text-align: center;
      font-size: 28px;
      color: #2c3e50;
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    th, td {
      padding: 10px;
      border: 1px solid #ccc;
      text-align: left;
      font-size: 14px;
    }
    th {
      background-color: #34495e;
      color: #ecf0f1;
      font-weight: 500;
    }
    tbody tr:hover {
      background-color: #f1f1f1;
    }
  </style>
</head>
<body>
  <h1>Órdenes de Compra</h1>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Fecha</th>
        <th>ID Usuario</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody id="ordenCompraBody"></tbody>
  </table>
  <script>
  // Recupera el token desde sessionStorage/localStorage
  const token = sessionStorage.getItem('token'); // o localStorage.getItem('token')

  fetch('/api/orden_compra', {
    headers: {
      'Authorization': 'Bearer ' + token
    }
  })
  .then(res => {
    if (!res.ok) {
      if (res.status === 403) {
        throw new Error('No tienes permisos para ver órdenes de compra (solo admin).');
      }
      throw new Error('Error al consultar órdenes de compra');
    }
    return res.json();
  })
  .then(data => {
    const tbody = document.getElementById("ordenCompraBody");
    tbody.innerHTML = "";
    data.forEach(orden => {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${orden.id}</td>
                      <td>${orden.fecha}</td>
                      <td>${orden.id_usuario}</td>
                      <td>S/ ${orden.total}</td>`;
      tbody.appendChild(tr);
    });
  })
  .catch(err => {
    document.getElementById("ordenCompraBody").innerHTML = `
      <tr><td colspan="4" style="color:red;text-align:center;">${err.message}</td></tr>
    `;
  });
</script>
</body>
</html>
